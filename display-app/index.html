<!doctype html>
<html lang="en" style="margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; position: fixed; top: 0; left: 0;">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/es6-shim/es6-shim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/es7-shim/es7-shim.min.js"></script>
    <script>
      window.onerror = function (msg, src, line, col, err) {
        document.body.style.background = "red";
        document.body.innerHTML =
          '<pre style="color:white;font-size:20px;padding:20px;">' +
          msg + "\n" + src + "\nLine: " + line + "</pre>";
        return false;
      };
    </script>
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>display-app</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100vw !important;
        height: 100vh !important;
        overflow: hidden !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
      }
      #root {
        width: 100vw !important;
        height: 100vh !important;
        margin: 0 !important;
        padding: 0 !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; position: fixed; top: 0; left: 0;">
    <div id="root" style="width: 100vw; height: 100vh; margin: 0; padding: 0; position: fixed; top: 0; left: 0;"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
