name: Build and Release Tablet App APK

on:
  push:
    tags:
      - 'tablet-app-v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: ./tablet-app
        run: npm ci

      - name: Build web assets
        working-directory: ./tablet-app
        run: npm run build

      - name: Setup Capacitor
        working-directory: ./tablet-app
        run: npx cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: ./tablet-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=$(echo "${{ github.ref }}" | sed 's/refs\/tags\/tablet-app-v//')
          else
            VERSION=$(node -p "require('./tablet-app/package.json').version || '1.0.0'")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mkdir -p release
          cp tablet-app/android/app/build/outputs/apk/release/app-release.apk release/tablet-app-v${{ steps.get_version.outputs.version }}.apk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Upload APK and version to S3
        run: |
          aws s3 cp release/tablet-app-v${{ steps.get_version.outputs.version }}.apk \
            s3://noraebox-audio-storage/updates/tablet-app/app.apk
          echo "${{ steps.get_version.outputs.version }}" > version.txt
          aws s3 cp version.txt s3://noraebox-audio-storage/updates/tablet-app/version.txt

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.apk
          tag_name: tablet-app-v${{ steps.get_version.outputs.version }}
          name: Tablet App v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tablet-app-apk
          path: release/*.apk
          retention-days: 30

