name: Build and Release Admin App (Web)

on:
  push:
    tags:
      - 'admin-app-v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./admin-app
        run: npm ci

      - name: Build web assets
        working-directory: ./admin-app
        run: npm run build

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=$(echo "${{ github.ref }}" | sed 's/refs\/tags\/admin-app-v//')
          else
            VERSION=$(node -p "require('./admin-app/package.json').version || '1.0.0'")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package Web Build
        shell: bash
        run: |
          mkdir -p release
          cp -r admin-app/dist release/admin-app
          cd release
          zip -r admin-app-v${{ steps.get_version.outputs.version }}.zip admin-app

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.zip
          tag_name: admin-app-v${{ steps.get_version.outputs.version }}
          name: Admin App v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-web
          path: admin-app/dist
          retention-days: 30

