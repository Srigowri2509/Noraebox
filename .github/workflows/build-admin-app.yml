name: Build and Release Admin App

on:
  push:
    tags:
      - 'admin-app-v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./admin-app
        run: npm ci

      - name: Build web assets
        working-directory: ./admin-app
        run: npm run build

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=$(echo "${{ github.ref }}" | sed 's/refs\/tags\/admin-app-v//')
          else
            VERSION=$(node -p "require('./admin-app/package.json').version || '1.0.0'")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Electron app
        shell: bash
        working-directory: ./admin-app
        run: |
          if [ "${{ runner.os }}" == "Linux" ]; then
            npm run electron:build:linux
          elif [ "${{ runner.os }}" == "Windows" ]; then
            npm run electron:build:win
          elif [ "${{ runner.os }}" == "macOS" ]; then
            npm run electron:build:mac
          fi

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ runner.os }}" == "Linux" ]; then
            cp admin-app/dist-electron/*.AppImage release/ 2>/dev/null || true
            cp admin-app/dist-electron/*.deb release/ 2>/dev/null || true
          elif [ "${{ runner.os }}" == "Windows" ]; then
            cp admin-app/dist-electron/*.exe release/ 2>/dev/null || true
          elif [ "${{ runner.os }}" == "macOS" ]; then
            cp admin-app/dist-electron/*.dmg release/ 2>/dev/null || true
          fi

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          tag_name: admin-app-v${{ steps.get_version.outputs.version }}
          name: Admin App v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-${{ runner.os }}
          path: release/*
          retention-days: 30

